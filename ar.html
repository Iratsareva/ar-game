<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js с GPS на A-Frame</title>
    <!-- Мета-тег для правильного масштабирования на мобильных устройствах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- Минимальные стили -->
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
            font-size: 14px;
        }
        #score-ar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: lime;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
    </style>
    <!-- Подключаем A-Frame версии 1.4.0 -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- Подключаем AR.js (последняя стабильная версия с поддержкой A-Frame) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Подключаем компонент GPS для AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="score-ar">🎯 Собрано: <span id="ar-score-value">0</span></div>
    <div id="info">Наведите камеру на область вокруг вас. Ищите сферы и кубы в AR!</div>

    <!-- AR Сцена с камерой -->
    <!-- Важно: embedded разрешает показывать HTML поверх, arjs активирует AR.js с настройками -->
    <a-scene embedded arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false; trackingMethod: best;">

        <!-- Видео-камера от AR.js (встроена) -->
        <a-camera gps-camera rotation-reader></a-camera> <!-- gps-camera для GPS и rotation-reader для ориентации -->

        <!-- Ресурсы: простая текстура для объектов -->
        <a-assets>
            <img id="pin" src="https://cdn-icons-png.flaticon.com/512/684/684908.png" crossorigin="anonymous"> <!-- Иконка-метка -->
            <a-asset-item id="star-model" src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf"></a-asset-item>
        </a-assets>

        <!-- Примеры AR объектов, размещенных по GPS координатам (замените на свои) -->
        <!-- Важно: координаты должны быть рядом с вашим текущим местоположением для теста -->
        <!-- Объект 1: Сфера на расстоянии ~5 метров на север (широта + небольшое смещение) -->
        <a-entity gps-entity-place="latitude: 55.755825; longitude: 37.617298;" position="0 0 0"> <!-- ВАЖНО: Замените эти координаты на свои реальные или близкие к вам! -->
            <a-sphere radius="0.5" material="color: cyan; emissive: blue; transparent: true; opacity: 0.8;" class="ar-clickable" id="ar-item-1">
                <a-animation attribute="scale" to="1.2 1.2 1.2" direction="alternate" dur="1000" repeat="indefinite"></a-animation>
            </a-sphere>
        </a-entity>

        <!-- Объект 2: Куб на расстоянии ~10 метров на восток -->
        <a-entity gps-entity-place="latitude: 55.755830; longitude: 37.617310;"> <!-- Замените координаты -->
            <a-box depth="0.8" height="0.8" width="0.8" material="color: red; emissive: darkred;" class="ar-clickable" id="ar-item-2">
                <a-animation attribute="rotation" to="0 360 0" dur="3000" repeat="indefinite"></a-animation>
            </a-box>
        </a-entity>

        <!-- Объект 3: 3D модель (шлем) -->
        <a-entity gps-entity-place="latitude: 55.755820; longitude: 37.617305;" position="0 0.5 0"> <!-- Замените координаты -->
            <a-entity gltf-model="#star-model" scale="0.5 0.5 0.5" class="ar-clickable" id="ar-item-3"></a-entity>
        </a-entity>

        <!-- Текст, который будет следовать за объектами? Лучше добавить как потомка -->
        <!-- Например, подпись под кубом -->
        <a-entity gps-entity-place="latitude: 55.755830; longitude: 37.617310;" text="value: КУБ; color: white; align: center; width: 5;" position="0 -0.8 0"></a-entity>

        <!-- Простая земля для AR (необязательно, но добавим плоскость под объекты?) В AR обычно не нужно -->
    </a-scene>

    <script>
        // --- Простая AR-игра: сбор объектов по клику на них (счетчик) ---
        let arScore = 0;
        const arScoreSpan = document.getElementById('ar-score-value');
        const arItems = document.querySelectorAll('.ar-clickable');

        // Добавляем обработчики клика на AR объекты
        arItems.forEach(item => {
            item.addEventListener('click', (evt) => {
                // Увеличиваем счет
                arScore++;
                arScoreSpan.textContent = arScore;

                // Анимация исчезновения (анимация по событию)
                item.setAttribute('animation', {
                    property: 'scale',
                    to: '0 0 0',
                    dur: 300,
                    easing: 'easeInQuad'
                });

                // Визуальный/звуковой фидбек
                const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3'); // короткий звук
                audio.volume = 0.3;
                audio.play();

                // Удаляем объект через 300 мс
                setTimeout(() => {
                    // Находим родительский gps-entity-place и удаляем его
                    const parentPlace = item.closest('[gps-entity-place]');
                    if (parentPlace) parentPlace.parentNode.removeChild(parentPlace);
                }, 300);
            });
        });

        // Выводим предупреждение, если координаты не заменены
        console.log('Важно: Замените GPS координаты в файле ar-index.html на координаты места, где вы будете тестировать!');
    </script>
</body>
</html>
