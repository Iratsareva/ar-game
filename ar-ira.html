<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>AR Collect Game</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }

/* ЭКРАНЫ */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  color:white;
  z-index:1000;
  text-align:center;
  padding:5vw;
}

h2 { font-size:7vw; }
p { font-size:4.5vw; }

button {
  padding:3vw 6vw;
  margin-top:4vw;
  font-size:4.5vw;
}

/* HUD */
#hud {
  position:fixed;
  top:0; left:0;
  width:100%;
  pointer-events:none;
  display:none;
}

#score, #timer {
  background:rgba(0,0,0,0.6);
  padding:2vw 3vw;
  border-radius:3vw;
  font-size:5vw;
  font-weight:bold;
}

#score {
  position:absolute;
  left:3vw; top:3vw;
  color:#00ffcc;
}

#timer {
  position:absolute;
  right:3vw; top:3vw;
  color:#ff5555;
}

#gpsInfo {
  position:absolute;
  bottom:2vw;
  width:100%;
  text-align:center;
  color:#00ff88;
  font-size:3.5vw;
}

#endScreen {
  display:none;
  background:rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<!-- СТАРТ -->
<div id="startScreen" class="overlay">
  <h2>AR GAME</h2>
  <p>Повернись и найди объекты</p>
  <button onclick="start()">START</button>
</div>

<!-- GPS -->
<div id="gpsScreen" class="overlay" style="display:none;">
  <h2>Загрузка...</h2>
</div>

<!-- GAME OVER -->
<div id="endScreen" class="overlay">
  <h2 id="resultText"></h2>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score">Score: 0</div>
  <div id="timer">Time: 30</div>
  <div id="gpsInfo"></div>
</div>

<!-- AR -->
<a-scene id="scene"
  embedded
  vr-mode-ui="enabled: false"
  renderer="alpha: true">

  <a-entity id="camera"
    camera
    gps-camera
    rotation-reader
    cursor="rayOrigin: mouse">
  </a-entity>

</a-scene>

<script>

let score = 0;
let total = 3;
let timeLeft = 30;
let gameOver = false;
let objectsSpawned = false;

function start(){

  document.getElementById("startScreen").style.display="none";
  document.getElementById("gpsScreen").style.display="flex";

  let scene = document.getElementById("scene");
  scene.setAttribute("arjs", "sourceType: webcam; videoTexture: true; debugUIEnabled: false;");

  let camera = document.getElementById("camera");

  // ✅ ЖДЁМ GPS (самое важное!)
  camera.addEventListener("gps-camera-update-position", (e)=>{

    if(objectsSpawned) return;

    let lat = e.detail.position.latitude;
    let lon = e.detail.position.longitude;

    document.getElementById("gpsScreen").style.display="none";
    document.getElementById("hud").style.display="block";

    document.getElementById("gpsInfo").innerText =
      "Lat: " + lat.toFixed(5) + " Lon: " + lon.toFixed(5);

    spawnObjects(lat, lon);
    objectsSpawned = true;

  });

}

// ОБЪЕКТЫ ВОКРУГ
function spawnObjects(lat, lon){

  // левее (~15м)
  createObj(lat, lon - 0.00015, "sphere", "red");

  // вперед (~20м)
  createObj(lat + 0.0002, lon, "box", "blue");

  // правее (~15м)
  createObj(lat, lon + 0.00015, "cylinder", "green");

}

// СОЗДАНИЕ ОБЪЕКТА
function createObj(lat, lon, type, color){

  let el = document.createElement("a-" + type);

  el.setAttribute("gps-entity-place",
    `latitude: ${lat}; longitude: ${lon}`);

  el.setAttribute("color", color);

  if(type === "sphere") el.setAttribute("radius","2");
  if(type === "box") el.setAttribute("depth","2");
  if(type === "cylinder") {
    el.setAttribute("radius","1.2");
    el.setAttribute("height","3");
  }

  el.setAttribute("look-at", "[gps-camera]");

  el.setAttribute("animation",
    "property: rotation; to: 0 360 0; loop: true; dur: 5000");

  el.addEventListener("click", ()=>{

    if(gameOver) return;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    el.setAttribute("animation__scale",
      "property: scale; to: 0 0 0; dur: 300");

    setTimeout(()=> el.remove(),300);

    if(score === total){
      endGame("YOU WIN");
    }

  });

  document.querySelector("a-scene").appendChild(el);
}

// ТАЙМЕР
setInterval(()=>{

  if(gameOver || !objectsSpawned) return;

  timeLeft--;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if(timeLeft <= 0){
    endGame("TIME UP");
  }

},1000);

// КОНЕЦ
function endGame(text){

  gameOver = true;

  document.getElementById("endScreen").style.display="flex";
  document.getElementById("resultText").innerText = text;

}

</script>

</body>
</html>
