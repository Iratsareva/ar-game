<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR.js FIX FINAL</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

<!-- ДРУГАЯ СБОРКА AR.js (важно!) -->
<script src="https://raw.githack.com/AR-js-org/AR.js/3.4.2/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }

#status {
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
    color:white;
    background:black;
    padding:10px;
}
</style>
</head>

<body>

<div id="status">Загрузка...</div>

<a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: true;"
>

    <a-camera></a-camera>

    <a-box position="0 0 -5" color="yellow"></a-box>

</a-scene>

<script>
const status = document.getElementById("status");

// 🔥 ЖДЁМ ПОЛНОЙ ЗАГРУЗКИ СЦЕНЫ
window.onload = () => {

    setTimeout(() => {

        const video = document.querySelector("video");

        if(video){
            status.innerHTML = "✅ video найден";

            video.setAttribute("autoplay","");
            video.setAttribute("muted","");
            video.setAttribute("playsinline","");

            video.play()
                .then(()=> status.innerHTML += "<br>▶ видео играет")
                .catch(e => status.innerHTML += "<br>❌ " + e.message);

        } else {
            status.innerHTML = "❌ AR.js НЕ создал video";
        }

    }, 2000);
};
</script>

</body>
</html>
