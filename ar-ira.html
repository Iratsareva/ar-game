<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>AR Collect Game</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }

/* ЭКРАНЫ */
.overlay {
  position:fixed;
  width:100vw; height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  color:white;
  z-index:1000;
  text-align:center;
}

h2 { font-size:7vw; }
p { font-size:4.5vw; }

button {
  padding:3vw 6vw;
  margin-top:4vw;
  font-size:4.5vw;
}

/* HUD */
#hud {
  position:fixed;
  width:100%;
  pointer-events:none;
  display:none;
}

#score, #timer {
  background:rgba(0,0,0,0.6);
  padding:2vw 3vw;
  border-radius:3vw;
  font-size:5vw;
  font-weight:bold;
}

#score {
  position:absolute;
  left:3vw; top:3vw;
  color:#00ffcc;
}

#timer {
  position:absolute;
  right:3vw; top:3vw;
  color:#ff5555;
}

#endScreen {
  display:none;
  background:rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<!-- СТАРТ -->
<div id="startScreen" class="overlay">
  <h2>AR GAME</h2>
  <p>Собери объекты перед собой</p>
  <button onclick="start()">START</button>
</div>

<!-- GAME OVER -->
<div id="endScreen" class="overlay">
  <h2 id="resultText"></h2>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score">Score: 0</div>
  <div id="timer">Time: 30</div>
</div>

<!-- AR -->
<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="alpha: true"
  arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-entity camera cursor="rayOrigin: mouse"></a-entity>

</a-scene>

<script>

let score = 0;
let total = 3;
let timeLeft = 30;
let gameOver = false;

// СТАРТ
function start(){

  document.getElementById("startScreen").style.display="none";
  document.getElementById("hud").style.display="block";

  spawnObjects();
}

// ОБЪЕКТЫ ПЕРЕД КАМЕРОЙ
function spawnObjects(){

  createObj("-2 1 -6", "sphere", "red");
  createObj("0 1 -6", "box", "blue");
  createObj("2 1 -6", "cylinder", "green");

}

// СОЗДАНИЕ ОБЪЕКТА
function createObj(pos, type, color){

  let el = document.createElement("a-" + type);

  el.setAttribute("position", pos);
  el.setAttribute("color", color);

  if(type === "sphere") el.setAttribute("radius","1");
  if(type === "box") el.setAttribute("depth","1");
  if(type === "cylinder") {
    el.setAttribute("radius","0.7");
    el.setAttribute("height","1.5");
  }

  el.setAttribute("animation",
    "property: rotation; to: 0 360 0; loop: true; dur: 4000");

  el.addEventListener("click", ()=>{

    if(gameOver) return;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    el.setAttribute("animation__scale",
      "property: scale; to: 0 0 0; dur: 200");

    setTimeout(()=> el.remove(),200);

    if(score === total){
      endGame("YOU WIN");
    }

  });

  document.querySelector("a-scene").appendChild(el);
}

// ТАЙМЕР
setInterval(()=>{

  if(gameOver) return;

  timeLeft--;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if(timeLeft <= 0){
    endGame("TIME UP");
  }

},1000);

// КОНЕЦ
function endGame(text){

  gameOver = true;

  document.getElementById("endScreen").style.display="flex";
  document.getElementById("resultText").innerText = text;

}

</script>

</body>
</html>
