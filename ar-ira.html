<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Collect Game</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }

/* ЭКРАНЫ */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  color:white;
  z-index:1000;
}

button {
  padding:15px 30px;
  margin-top:20px;
  font-size:18px;
}

/* HUD */
#hud {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  display:none;
}

#score {
  position:absolute;
  left:20px; top:20px;
  color:#00ffcc;
  font-size:20px;
}

#timer {
  position:absolute;
  right:20px; top:20px;
  color:#ff5555;
  font-size:20px;
}

#gpsInfo {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:#00ff88;
  font-size:14px;
}

/* GAME OVER */
#endScreen {
  display:none;
  background:rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<!-- СТАРТ -->
<div id="startScreen" class="overlay">
  <h2>AR GAME</h2>
  <p>Собери все объекты вокруг себя</p>
  <button onclick="start()">START</button>
</div>

<!-- GPS -->
<div id="gpsScreen" class="overlay" style="display:none;">
  <h2>GPS</h2>
  <p>Разрешите доступ к геолокации</p>
</div>

<!-- GAME OVER -->
<div id="endScreen" class="overlay">
  <h2 id="resultText"></h2>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score">Score: 0</div>
  <div id="timer">Time: 30</div>
  <div id="gpsInfo"></div>
</div>

<!-- AR -->
<a-scene embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="alpha: true">

  <a-entity camera gps-camera rotation-reader></a-entity>

</a-scene>

<script>

let score = 0;
let total = 3;
let timeLeft = 30;
let gameOver = false;

// СТАРТ
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("gpsScreen").style.display="flex";

  navigator.geolocation.getCurrentPosition((pos)=>{
    document.getElementById("gpsScreen").style.display="none";
    document.getElementById("hud").style.display="block";

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    document.getElementById("gpsInfo").innerText =
      "Lat: " + lat.toFixed(5) + " Lon: " + lon.toFixed(5);

    spawnObjects(lat, lon);

  });
}

// СПАВН ОБЪЕКТОВ
function spawnObjects(lat, lon){

  let scene = document.querySelector("a-scene");

  let parent = document.createElement("a-entity");
  parent.setAttribute("gps-entity-place",
    `latitude: ${lat}; longitude: ${lon}`);

  scene.appendChild(parent);

  createObj(parent, "sphere", "-2 1 -5", "red");
  createObj(parent, "box", "0 1 -5", "blue");
  createObj(parent, "cylinder", "2 1 -5", "green");
}

// СОЗДАНИЕ ОБЪЕКТА
function createObj(parent, type, pos, color){

  let el = document.createElement("a-" + type);
  el.setAttribute("position", pos);
  el.setAttribute("color", color);

  el.setAttribute("animation",
    "property: rotation; to: 0 360 0; loop: true; dur: 4000");

  el.addEventListener("click", ()=>{

    if(gameOver) return;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    el.remove();

    if(score === total){
      endGame("YOU WIN");
    }

  });

  parent.appendChild(el);
}

// ТАЙМЕР
setInterval(()=>{

  if(gameOver) return;

  timeLeft--;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if(timeLeft <= 0){
    endGame("TIME UP");
  }

},1000);

// КОНЕЦ
function endGame(text){

  gameOver = true;

  document.getElementById("endScreen").style.display="flex";
  document.getElementById("resultText").innerText = text;

}

</script>

</body>
</html>
