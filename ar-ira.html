<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Mini Game</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }

/* HUD */
#hud {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  color:white;
}

#score {
  position:absolute;
  left:20px; top:20px;
  color:#00ffcc;
  font-size:20px;
}

#timer {
  position:absolute;
  right:20px; top:20px;
  color:#ff5555;
  font-size:20px;
}

/* overlay */
#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-size:30px;
}
</style>
</head>

<body>

<div id="hud">
  <div id="score">Score: 0</div>
  <div id="timer">Time: 30</div>
</div>

<div id="overlay">
  <div id="result"></div>
</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="alpha: true">

  <a-entity camera gps-camera rotation-reader></a-entity>

</a-scene>

<script>

// ===== ИГРА =====
let score = 0;
let total = 3;
let timeLeft = 30;
let gameOver = false;

// ===== GPS =====
navigator.geolocation.getCurrentPosition((pos)=>{
  spawnObjects(pos.coords.latitude, pos.coords.longitude);
});

// ===== СОЗДАНИЕ ОБЪЕКТОВ =====
function spawnObjects(lat, lon){

  let scene = document.querySelector("a-scene");

  let parent = document.createElement("a-entity");
  parent.setAttribute("gps-entity-place", `latitude: ${lat}; longitude: ${lon}`);
  parent.setAttribute("position","0 0 -5");

  scene.appendChild(parent);

  // ШАР
  createObject(parent, "sphere", "-2 1 0", "red");

  // КУБ
  createObject(parent, "box", "0 1 0", "blue");

  // ЦИЛИНДР
  createObject(parent, "cylinder", "2 1 0", "green");

}

// ===== СОЗДАНИЕ ОБЪЕКТА =====
function createObject(parent, type, pos, color){

  let el = document.createElement("a-" + type);

  el.setAttribute("position", pos);
  el.setAttribute("color", color);

  if(type === "sphere") el.setAttribute("radius","0.5");
  if(type === "cylinder") el.setAttribute("height","1");

  // анимация
  el.setAttribute("animation","property: rotation; to: 0 360 0; loop: true; dur: 4000");

  // клик
  el.addEventListener("click", ()=>{

    if(gameOver) return;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    el.setAttribute("animation__scale","property: scale; to: 0 0 0; dur: 200");

    setTimeout(()=> el.remove(),200);

    if(score === total){
      endGame("YOU WIN!");
    }

  });

  parent.appendChild(el);
}

// ===== ТАЙМЕР =====
setInterval(()=>{

  if(gameOver) return;

  timeLeft--;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if(timeLeft <= 0){
    endGame("TIME UP!");
  }

},1000);

// ===== КОНЕЦ ИГРЫ =====
function endGame(text){

  gameOver = true;

  document.getElementById("overlay").style.display = "flex";
  document.getElementById("result").innerText = text;

}

</script>

</body>
</html>
