<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <title>AR Game</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    /* ... стили без изменений ... */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
    #ar-scene-wrapper { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
    #ar-scene-wrapper.active { display: block; }
    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
      display: none;
    }
    #hud.active { display: block; }
    #score-display {
      position: absolute;
      top: 20px; left: 20px;
      background: rgba(34, 68, 34, 0.8);
      color: #d4f0d4;
      font-size: 5vw;
      font-weight: bold;
      padding: 2vw 4vw;
      border-radius: 10vw;
      backdrop-filter: blur(4px);
      border: 1px solid #4a7a4a;
    }
    #timer-display {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(34, 68, 34, 0.8);
      color: #d4f0d4;
      font-size: 5vw;
      font-weight: bold;
      padding: 2vw 4vw;
      border-radius: 10vw;
      backdrop-filter: blur(4px);
      border: 1px solid #4a7a4a;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      text-align: center;
      padding: 6vw;
      background-image: url('https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/terrain/grasslight-big.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      position: relative;
      min-height: 100vh;
    }
    .overlay::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 30, 0, 0.6);
      z-index: -1;
    }
    .overlay h2 {
      font-size: 8vw;
      margin-bottom: 3vw;
      color: #b8e0b8;
      text-shadow: 2px 2px 4px #1a3a1a;
    }
    .overlay p {
      font-size: 4.5vw;
      color: #e0f0e0;
      margin-bottom: 5vw;
      line-height: 1.5;
      text-shadow: 1px 1px 2px #1a3a1a;
    }
    .btn {
      display: block;
      border: none;
      border-radius: 10vw;
      padding: 4vw 8vw;
      font-size: 5vw;
      font-weight: bold;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #3d8f3d, #1f5f1f);
      color: white;
      box-shadow: 0 4px 10px rgba(0, 30, 0, 0.5);
      transition: transform 0.1s;
      width: 70vw;
      max-width: 400px;
      margin: 2vw auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.95); }
    /* больше не нужны отдельные классы для оранжевой/красной кнопки, оставим для совместимости */
    .btn-orange { background: linear-gradient(135deg, #4caf4c, #2e7d32); }
    .btn-red { background: linear-gradient(135deg, #4caf4c, #2e7d32); color: white; }
    #screen-win h1 {
      font-size: 10vw;
      color: #b8e0b8;
      text-shadow: 2px 2px 6px #1a3a1a;
      margin-bottom: 4vw;
    }
    #gps-status {
      margin-top: 4vw;
      font-size: 4vw;
      color: #b8e0b8;
      text-shadow: 1px 1px 2px #1a3a1a;
    }
    #screen-start { display: flex; }
  </style>
</head>
<body>

  <!-- ЭКРАН 1: СТАРТ -->
  <div id="screen-start" class="overlay">
    <h2>AR GAME</h2>
    <p>
      Найди и собери все фигуры в реальном мире!<br>
      Счёт и таймер на экране.
    </p>
    <button class="btn" onclick="onStartAR()">СТАРТ</button>
  </div>

  <!-- ЭКРАН 2: ОЖИДАНИЕ GPS (бывший экран 3) -->
  <div id="screen-gps" class="overlay" style="display: none;">
    <h2><div id="gps-status">Получение GPS...</div></h2>
  </div>

  <!-- ЭКРАН 3: КОНЕЦ ИГРЫ (бывший экран 4) -->
  <div id="screen-end" class="overlay" style="display: none;">
    <h1 id="end-title">GAME OVER</h1>
    <p style="font-size:6vw; color:#b8e0b8;" id="end-score">Счёт: 0</p>
    <button class="btn btn-red" onclick="restartGame()">ЗАНОВО</button>
  </div>

  <!-- ОБЁРТКА ДЛЯ AR-СЦЕНЫ -->
  <div id="ar-scene-wrapper"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="score-display">Счёт: 0</div>
    <div id="timer-display">30</div>
  </div>

  <script>
    // Состояние игры
    let GAME = {
      state: 'menu',
      score: 0,
      totalObjects: 3,
      timeLeft: 30,
      timerInterval: null,
      spawned: false,
      // статические координаты больше не используются, но оставим на случай
      currentLat: null,
      currentLon: null
    };

    // ---------- УПРАВЛЕНИЕ ЭКРАНАМИ ----------
    function showScreen(id) {
      document.querySelectorAll('.overlay').forEach(s => s.style.display = 'none');
      if (id) document.getElementById(id).style.display = 'flex';
    }

    // ---------- ЗАПРОС РАЗРЕШЕНИЙ И СРАЗУ GPS ----------
    function onStartAR() {
      // Для iOS: запрашиваем разрешение на ориентацию, затем запускаем GPS
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(() => requestGps())
          .catch(() => requestGps()); // даже если отказ, пробуем GPS
      } else {
        requestGps();
      }
    }

    // Запрос GPS и показ экрана ожидания
    function requestGps() {
      showScreen('screen-gps');
      document.getElementById('gps-status').textContent = 'Получение GPS…';

      if (!navigator.geolocation) {
        document.getElementById('gps-status').textContent = '❌ Геолокация не поддерживается';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          GAME.currentLat = pos.coords.latitude;
          GAME.currentLon = pos.coords.longitude;
          showScreen(null);
          launchAR('gps');
        },
        (err) => {
          document.getElementById('gps-status').textContent = '❌ ' + err.message;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    // ---------- ЗАПУСК AR-СЦЕНЫ ----------
    function launchAR(source) {
      document.getElementById('ar-scene-wrapper').classList.add('active');
      document.getElementById('hud').classList.add('active');
      buildScene(GAME.currentLat, GAME.currentLon, source);
    }

    function buildScene(lat, lon, source) {
      const wrapper = document.getElementById('ar-scene-wrapper');
      wrapper.innerHTML = '';

      const scene = document.createElement('a-scene');
      scene.setAttribute('id', 'ar-scene');
      scene.setAttribute('vr-mode-ui', 'enabled: false');
      scene.setAttribute('arjs', 'sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: best');
      scene.setAttribute('renderer', 'antialias: true; alpha: true');
      scene.setAttribute('embedded', '');
      scene.style.width = '100%';
      scene.style.height = '100%';

      scene.innerHTML = `
        <a-camera gps-camera rotation-reader>
          <a-cursor fuse="false"
                    material="color: white"
                    geometry="radiusInner: 0.01; radiusOuter: 0.02">
          </a-cursor>
        </a-camera>
      `;

      wrapper.appendChild(scene);

      scene.addEventListener('loaded', () => {
        console.log('Сцена загружена, координаты центра:', lat, lon);

        if (!GAME.spawned) {
          setTimeout(() => {
            if (!GAME.spawned) {
              console.log('Создаём объекты по таймауту');
              spawnObjects(lat, lon);
              GAME.spawned = true;
              startTimer();
            }
          }, 3000);
        }

        const camera = document.querySelector('[gps-camera]');
        if (camera) {
          const onGpsUpdate = (e) => {
            if (GAME.spawned) return;
            console.log('Событие gps-camera-update-position, создаём объекты');
            spawnObjects(lat, lon);
            GAME.spawned = true;
            startTimer();
            camera.removeEventListener('gps-camera-update-position', onGpsUpdate);
          };
          camera.addEventListener('gps-camera-update-position', onGpsUpdate);

          if (camera.components && camera.components['gps-camera'] && camera.components['gps-camera'].currentPosition) {
            if (!GAME.spawned) {
              console.log('Камера уже имеет позицию, создаём объекты');
              spawnObjects(lat, lon);
              GAME.spawned = true;
              startTimer();
            }
          }
        }
      });
    }

    // ---------- СОЗДАНИЕ ОБЪЕКТОВ (без изменений) ----------
    function spawnObjects(centerLat, centerLon) {
        console.log('spawnObjects вызван', centerLat, centerLon);

        const radius = 0.0002;
        const baseLat = centerLat + radius;
        const lonOffsets = [-0.00015, 0, 0.00015];

        const types = ['sphere', 'box', 'cylinder'];
        const colors = ['red', 'blue', 'green'];

        for (let i = 0; i < 3; i++) {
            const lon = centerLon + lonOffsets[i];

            const el = document.createElement(`a-${types[i]}`);
            el.setAttribute('gps-entity-place', `latitude: ${baseLat}; longitude: ${lon}`);
            el.setAttribute('color', colors[i]);
            el.setAttribute('scale', '20 20 20');
            el.setAttribute('position', '100 163 0'); 

            el.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 5000');

            el.addEventListener('click', () => {
                if (GAME.state !== 'playing') return;

                // ВОСПРОИЗВЕДЕНИЕ ЗВУКА
                try {
                    const audio = new Audio('Sound.mp3');
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log('Ошибка воспроизведения звука:', e));
                } catch (e) {
                    console.log('Аудио не поддерживается');
                }

                GAME.score++;
                updateScore();
                console.log('Счёт:', GAME.score);

                el.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 200');
                setTimeout(() => el.remove(), 200);

                if (GAME.score >= GAME.totalObjects) {
                    endGame('ПОБЕДА!');
                }
            });

            document.querySelector('a-scene').appendChild(el);
            console.log('Объект создан:', types[i], baseLat, lon);
        }

        GAME.state = 'playing';
    }

    // ---------- ТАЙМЕР ----------
    function startTimer() {
      if (GAME.timerInterval) clearInterval(GAME.timerInterval);
      GAME.timeLeft = 30;
      updateTimerDisplay();

      GAME.timerInterval = setInterval(() => {
        if (GAME.state !== 'playing') return;
        GAME.timeLeft--;
        updateTimerDisplay();
        if (GAME.timeLeft <= 0) {
          endGame('ВРЕМЯ ВЫШЛО');
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const timerEl = document.getElementById('timer-display');
      if (timerEl) timerEl.textContent = GAME.timeLeft;
    }

    function updateScore() {
      const scoreEl = document.getElementById('score-display');
      if (scoreEl) scoreEl.textContent = 'Счёт: ' + GAME.score;
    }

    // ---------- ЗАВЕРШЕНИЕ ИГРЫ ----------
    function endGame(message) {
      if (GAME.state === 'gameover') return;
      GAME.state = 'gameover';

      if (GAME.timerInterval) {
        clearInterval(GAME.timerInterval);
        GAME.timerInterval = null;
      }

      document.getElementById('end-title').textContent = message;
      document.getElementById('end-score').textContent = 'Счёт: ' + GAME.score;
      showScreen('screen-end');
      document.getElementById('hud').classList.remove('active');
    }

    // ---------- ПЕРЕЗАПУСК ----------
    function restartGame() {
      GAME.state = 'menu';
      GAME.score = 0;
      GAME.timeLeft = 30;
      GAME.spawned = false;
      if (GAME.timerInterval) clearInterval(GAME.timerInterval);

      const wrapper = document.getElementById('ar-scene-wrapper');
      wrapper.innerHTML = '';
      wrapper.classList.remove('active');
      document.getElementById('hud').classList.remove('active');

      showScreen('screen-start');
    }
  </script>
</body>
</html>
