<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS + маркер (для запроса камеры)</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.2/aframe/build/aframe-ar.js"></script>
    <!-- Eruda для отладки на телефоне (можно удалить потом) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body style="margin:0; overflow:hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: true; trackingMethod: best;"
        renderer="logarithmicDepthBuffer: true;"
    >
        <!-- Временный маркер Hiro для активации камеры -->
        <a-marker preset="hiro">
            <a-box color="red" position="0 0.5 0" scale="0.5 0.5 0.5"></a-box>
        </a-marker>

        <!-- Камера с GPS (будет работать одновременно с маркером) -->
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        console.log("Скрипт запущен");

        // Дожидаемся полной загрузки сцены
        document.querySelector('a-scene').addEventListener('loaded', function () {
            console.log("Сцена загружена, запрашиваем геолокацию...");

            if (!navigator.geolocation) {
                alert("Geolocation не поддерживается");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    console.log("Геолокация получена:", position.coords);
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const scene = document.querySelector('a-scene');

                    // Создаём объекты рядом с пользователем
                    const objects = [
                        { type: 'box', color: 'red', latOffset: 0.0001, lonOffset: 0, scale: '20 20 20' },
                        { type: 'sphere', color: 'blue', latOffset: 0, lonOffset: 0.0001, radius: 10 },
                        { type: 'torus', color: 'green', latOffset: -0.0001, lonOffset: 0, radius: 15, tubular: 1 }
                    ];

                    objects.forEach((obj, index) => {
                        let entity;
                        if (obj.type === 'box') {
                            entity = document.createElement('a-box');
                            entity.setAttribute('material', `color: ${obj.color}`);
                            entity.setAttribute('scale', obj.scale);
                        } else if (obj.type === 'sphere') {
                            entity = document.createElement('a-sphere');
                            entity.setAttribute('material', `color: ${obj.color}`);
                            entity.setAttribute('radius', obj.radius);
                        } else if (obj.type === 'torus') {
                            entity = document.createElement('a-torus');
                            entity.setAttribute('material', `color: ${obj.color}`);
                            entity.setAttribute('radius', obj.radius);
                            entity.setAttribute('radius-tubular', obj.tubular);
                        }

                        entity.setAttribute('gps-entity-place', `latitude: ${lat + obj.latOffset}; longitude: ${lon + obj.lonOffset}`);
                        entity.setAttribute('class', 'collectible');
                        scene.appendChild(entity);
                        console.log(`Объект ${index} добавлен`);
                    });

                    console.log("Все объекты добавлены. Если вы не видите их, проверьте:");
                    console.log("- Находитесь ли вы рядом с созданными координатами? (смещение ~10-20 м)");
                    console.log("- Достаточно ли велики объекты? (сейчас куб 20м, сфера 10м радиус)");
                    console.log("- Включён ли GPS высокой точности на телефоне?");
                },
                (error) => {
                    alert(`Ошибка геолокации: ${error.message}`);
                    console.error("Ошибка геолокации:", error);
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        });
    </script>
</body>
</html>
