<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR FIX WORKING</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }

#status {
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
    color:white;
    background:black;
    padding:10px;
}

#btn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:9999;
    padding:20px;
}
</style>
</head>

<body>

<div id="status">Нажми старт</div>
<button id="btn">СТАРТ</button>

<a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="alpha: true;"
    arjs="sourceType: webcam;"
>

    <a-camera></a-camera>

    <!-- ПРОВЕРОЧНЫЙ ОБЪЕКТ -->
    <a-box position="0 0 -5" color="yellow"></a-box>

</a-scene>

<script>
const btn = document.getElementById("btn");
const status = document.getElementById("status");

btn.onclick = async () => {

    btn.style.display = "none";

    try {
        await navigator.mediaDevices.getUserMedia({
            video: true
        });
        status.innerHTML = "Камера OK";
    } catch(e){
        status.innerHTML = "Ошибка камеры";
        return;
    }

    const video = document.querySelector("video");

    setTimeout(() => {
        if(video){
            video.setAttribute("autoplay","");
            video.setAttribute("muted","");
            video.setAttribute("playsinline","");
            video.play();
            status.innerHTML += "<br>Видео запущено";
        } else {
            status.innerHTML += "<br>❌ video нет";
        }
    },1000);
};
</script>

</body>
</html>
