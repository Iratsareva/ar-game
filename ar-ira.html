<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Collect Game</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }

/* ЭКРАНЫ */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  color:white;
  z-index:1000;
  text-align:center;
  padding:20px;
}

button {
  padding:12px 25px;
  margin-top:15px;
  font-size:16px;
}

/* HUD */
#hud {
  position:fixed;
  top:0; left:0;
  width:100%;
  pointer-events:none;
  display:none;
}

#score, #timer {
  background:rgba(0,0,0,0.5);
  padding:8px 12px;
  border-radius:10px;
  font-size:22px;
  font-weight:bold;
}

#score {
  position:absolute;
  left:10px; top:10px;
  color:#00ffcc;
}

#timer {
  position:absolute;
  right:10px; top:10px;
  color:#ff5555;
}

#gpsInfo {
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  color:#00ff88;
  font-size:14px;
}

/* GAME OVER */
#endScreen {
  display:none;
  background:rgba(0,0,0,0.85);
}
</style>
</head>

<body>

<!-- СТАРТ -->
<div id="startScreen" class="overlay">
  <h2>AR GAME</h2>
  <p>Собери все объекты вокруг себя</p>
  <button onclick="start()">START</button>
</div>

<!-- GPS -->
<div id="gpsScreen" class="overlay" style="display:none;">
  <h3>Включите GPS и камеру</h3>
</div>

<!-- GAME OVER -->
<div id="endScreen" class="overlay">
  <h2 id="resultText"></h2>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score">Score: 0</div>
  <div id="timer">Time: 30</div>
  <div id="gpsInfo"></div>
</div>

<!-- AR -->
<a-scene embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="alpha: true">

  <a-entity camera gps-camera rotation-reader>

    <!-- КУРСОР (чтобы работал клик) -->
    <a-cursor fuse="true" fuse-timeout="800"
      material="color: white; shader: flat"
      geometry="radiusInner: 0.01; radiusOuter: 0.02">
    </a-cursor>

  </a-entity>

</a-scene>

<script>

let score = 0;
let total = 3;
let timeLeft = 30;
let gameOver = false;

// СТАРТ
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("gpsScreen").style.display="flex";

  navigator.geolocation.getCurrentPosition((pos)=>{

    document.getElementById("gpsScreen").style.display="none";
    document.getElementById("hud").style.display="block";

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    document.getElementById("gpsInfo").innerText =
      "Lat: " + lat.toFixed(5) + " Lon: " + lon.toFixed(5);

    spawnObjects(lat, lon);

  });
}

// СПАВН ОБЪЕКТОВ (✔ теперь в пространстве)
function spawnObjects(lat, lon){

  createObj(lat + 0.00005, lon, "sphere", "red");
  createObj(lat, lon + 0.00005, "box", "blue");
  createObj(lat - 0.00005, lon, "cylinder", "green");

}

// СОЗДАНИЕ ОБЪЕКТА
function createObj(lat, lon, type, color){

  let el = document.createElement("a-" + type);

  el.setAttribute("gps-entity-place",
    `latitude: ${lat}; longitude: ${lon}`);

  el.setAttribute("color", color);

  if(type === "sphere") el.setAttribute("radius","1");
  if(type === "box") el.setAttribute("depth","1");
  if(type === "cylinder") {
    el.setAttribute("radius","0.7");
    el.setAttribute("height","1.5");
  }

  el.setAttribute("animation",
    "property: rotation; to: 0 360 0; loop: true; dur: 4000");

  // ✔ ВАЖНО: для клика в AR
  el.setAttribute("class","clickable");

  el.addEventListener("click", ()=>{

    if(gameOver) return;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    el.setAttribute("animation__scale",
      "property: scale; to: 0 0 0; dur: 200");

    setTimeout(()=> el.remove(),200);

    if(score === total){
      endGame("YOU WIN");
    }

  });

  document.querySelector("a-scene").appendChild(el);
}

// ТАЙМЕР
setInterval(()=>{

  if(gameOver) return;

  timeLeft--;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if(timeLeft <= 0){
    endGame("TIME UP");
  }

},1000);

// КОНЕЦ
function endGame(text){

  gameOver = true;

  document.getElementById("endScreen").style.display="flex";
  document.getElementById("resultText").innerText = text;

}

</script>

</body>
</html>
