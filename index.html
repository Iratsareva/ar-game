<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR.js GPS WORKING</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.2/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }
#status {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    color: white;
    background: rgba(0,0,0,0.7);
    padding: 10px;
}
#startBtn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:9999;
    padding:20px;
    font-size:20px;
}
</style>
</head>

<body>

<div id="status">Нажми кнопку</div>
<button id="startBtn">СТАРТ</button>

<a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: true;"
>

    <a-camera gps-camera rotation-reader></a-camera>

    <a-entity light="type: ambient; intensity: 1"></a-entity>

</a-scene>

<script>
const statusDiv = document.getElementById("status");
const btn = document.getElementById("startBtn");

function log(msg){
    console.log(msg);
    statusDiv.innerHTML += "<br>" + msg;
}

btn.onclick = async () => {

    btn.style.display = "none";

    // 🔥 ЯВНО запускаем камеру
    try {
        await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
        });
        log("Камера разрешена");
    } catch(e){
        log("Ошибка камеры: " + e.message);
        return;
    }

    // GPS
    navigator.geolocation.getCurrentPosition((pos)=>{

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        log("GPS: " + lat + "," + lon);

        const scene = document.querySelector("#scene");

        // КРАСНЫЙ БОКС
        const box = document.createElement("a-box");
        box.setAttribute("color", "red");
        box.setAttribute("scale", "8 8 8");

        box.setAttribute("gps-entity-place",
            `latitude: ${lat + 0.00005}; longitude: ${lon}`
        );

        box.setAttribute("look-at", "[gps-camera]");
        scene.appendChild(box);

        // СИНИЙ ШАР
        const sphere = document.createElement("a-sphere");
        sphere.setAttribute("color", "blue");
        sphere.setAttribute("radius", "5");

        sphere.setAttribute("gps-entity-place",
            `latitude: ${lat}; longitude: ${lon + 0.00005}`
        );

        sphere.setAttribute("look-at", "[gps-camera]");
        scene.appendChild(sphere);

        log("Объекты добавлены");

    }, (err)=>{
        log("GPS ошибка: " + err.message);
    });

};
</script>

</body>
</html>
